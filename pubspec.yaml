name: esun_mobile
description: ESUN - Personal Finance Ecosystem
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  state_notifier: ^1.0.0
  
  # Navigation
  go_router: ^13.0.1
  
  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^5.0.2
  
  # Storage & Security
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  local_auth: ^2.1.8
  encrypt: ^5.0.3
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^28.1.38
  lottie: ^3.0.0
  flutter_markdown: ^0.6.22
  
  # Utilities
  intl: any
  uuid: ^4.3.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0
  
  # Speech & AI
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.5
  
  # Camera & QR
  camera: ^0.10.5+9
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0
  
  # Biometrics
  app_links: ^6.3.0
  
  # Analytics
  firebase_analytics: ^11.6.0
  firebase_core: ^3.7.0
  
  # Permissions
  permission_handler: ^11.2.0
  flutter_contacts: ^1.1.7
  
  # Device Info
  device_info_plus: ^12.0.0
  package_info_plus: ^9.0.0
  share_plus: ^10.0.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
